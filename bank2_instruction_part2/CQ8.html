{{ extends "global/Page.html" }}
{{ block title }}Comprehension Check{{ endblock }}

{{ block content }}
<br>
<p style="font-size:12px; color:#6b7280; margin-bottom:20px;">Question 8 of 9</p>
{{ formfield 'comprehension_q8' }}
<div id="fb-q8" style="display:none; color:#c62828; background:#fff3e0; border:1px solid #e65100; border-radius:6px; padding:8px 14px; margin-bottom:8px;"></div>
<div style="text-align:center; padding-top:20px;">{{ next_button }}</div>
<script>
document.querySelector('form').addEventListener('submit', function(e) {
    var sel = document.querySelector('input[name="comprehension_q8"]:checked');
    var fb  = document.getElementById('fb-q8');
    fb.style.display = 'none';
    if (!sel) {
        e.preventDefault(); fb.textContent = 'Please select an answer.'; fb.style.display = 'block'; return;
    }
    if (sel.value !== 'b-stage1') {
        e.preventDefault(); fb.textContent = 'Incorrect. You receive a message from the Observer only if you stayed in Period 1 and moved to Period 2.'; fb.style.display = 'block';
    }
});
</script>
{{ endblock }}
